<!DOCTYPE html>
<html lang="">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="../../img/RoltonsLV_Icon.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <title>RalphMania</title>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.js"></script>
  
    </body>
    
    <style>
        body {
        background-image: url('C:\Users\rm00457\Downloads\RalphMania\RalphMania\public\img\Coder_RoltonsLV.png');
        }
        .apraksts {
            font-size: 15px;
            text-align: center;
        }

        .upper_menu {
            background: linear-gradient(to bottom, firebrick, rgb(116, 22, 22));
            border-radius: 10px;
            padding: 5px;
            outline: 2px solid black;
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            button {
                font-family: cursive;
                font-weight: bold;
            }
        }

        .RoltonsLV_Icon, .YT_logo {
            max-width: 50px; /* Set the size for the images */
            height: auto;
        }


        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1; /* Allows the button container to take up space in the middle */
        }

        button {
            background: linear-gradient(to bottom, rgb(229, 112, 112), rgb(143, 69, 69));
            color: black;
            padding: 5px 20px;
            cursor: pointer;
            margin: 2px;
            font-size: 20px;
            border-radius: 10px;
        }

        .improvision {
            background: linear-gradient(to bottom, rgb(229, 112, 112), rgb(143, 69, 69));
            outline: 2px solid darkred;
            border-radius: 20px;
            width: 100%;
            padding: 0 10px;
            font-family: cursive;
        }

        .flex-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;    /* for responsive button wrapping purposes */
            justify-content: center;
            border-radius: 20px;
        }

        .flex-container img {
            max-width: 90%;   /* Make the image scale inside the button */
            max-height: 150px; /* Set a max height for the image */
            height: auto;
            width: auto;
            border-radius: 10px;
            outline: 2px solid black;
        }

        .spacing {
            padding: 10px;
            font-size: 15px;
            font-family: cursive;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.1);
            transition: transform 0.1s ease;
            animation: hoverUp 0.5s forwards;
            box-shadow: 10px 10px 15px rgba(0, 0 , 0, 0.6);
        }

        @keyframes hoverUp {
            0% {
                transform: translateY(0);
            } 100% {
                transform: translateY(-10px) scale(1.1)  ;
            }
        }

        @media (max-width: 800px) {
            body { background-image: url('Coder_RoltonsLV.png'); }
            .column {
                flex: 1 1 calc(50% - 5px);
                max-width: 100%;
            }
            .flex-container {
                flex: 1 1 calc(50% - 5px);
                max-width: 100%;
            }

        }

        @media (max-width: 600px) {
            body { background-image: url('Coder_RoltonsLV.png'); }
            .column {
                flex: 1 1 calc(100% - 5px);
                max-width: 100%;
            }
            .flex-container {
                flex: 1 1 calc(100% - 5px);
                max-width: 100%;
            }
        }

    </style>
  
</html>
